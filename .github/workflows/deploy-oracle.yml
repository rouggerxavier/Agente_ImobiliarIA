name: Deploy to Oracle VM

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.ORACLE_HOST || secrets.OCI_HOST || vars.ORACLE_HOST || vars.OCI_HOST }}
      DEPLOY_USER: ${{ secrets.ORACLE_USER || secrets.OCI_USER || vars.ORACLE_USER || vars.OCI_USER }}
      DEPLOY_KEY: ${{ secrets.ORACLE_SSH_KEY || secrets.OCI_SSH_KEY }}
      DEPLOY_PASSPHRASE: ${{ secrets.ORACLE_SSH_PASSPHRASE || secrets.OCI_SSH_PASSPHRASE }}
      DEPLOY_PORT: ${{ secrets.ORACLE_SSH_PORT || secrets.OCI_SSH_PORT || vars.ORACLE_SSH_PORT || vars.OCI_SSH_PORT || '22' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy settings
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_HOST}" ]]; then
            echo "::error::Missing host. Configure ORACLE_HOST (or OCI_HOST) in repository secrets/variables."
            exit 1
          fi
          if [[ -z "${DEPLOY_USER}" ]]; then
            echo "::error::Missing user. Configure ORACLE_USER (or OCI_USER) in repository secrets/variables."
            exit 1
          fi
          if [[ -z "${DEPLOY_KEY}" ]]; then
            echo "::error::Missing SSH key. Configure ORACLE_SSH_KEY (or OCI_SSH_KEY) in repository secrets."
            exit 1
          fi

      - name: Prepare SSH key file
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          KEY_FILE="$HOME/.ssh/deploy_key"
          RAW_KEY="${DEPLOY_KEY//$'\r'/}"
          RAW_KEY="${RAW_KEY%\"}"
          RAW_KEY="${RAW_KEY#\"}"
          TMP_FILE="$(mktemp)"

          if [[ "$RAW_KEY" == ssh-rsa* || "$RAW_KEY" == ssh-ed25519* || "$RAW_KEY" == ecdsa-* ]]; then
            echo "::error::ORACLE_SSH_KEY appears to be a PUBLIC key. Use the PRIVATE key (BEGIN OPENSSH PRIVATE KEY or BEGIN RSA PRIVATE KEY)."
            exit 1
          fi

          if [[ "$RAW_KEY" == *"BEGIN OPENSSH PRIVATE KEY"* || "$RAW_KEY" == *"BEGIN RSA PRIVATE KEY"* || "$RAW_KEY" == *"BEGIN EC PRIVATE KEY"* ]]; then
            printf '%b' "$RAW_KEY" > "$TMP_FILE"
          elif printf '%s' "$RAW_KEY" | base64 -d > "$TMP_FILE" 2>/dev/null; then
            :
          else
            echo "::error::ORACLE_SSH_KEY invalid format. Provide the raw private key text or base64-encoded private key."
            exit 1
          fi

          tr -d '\r' < "$TMP_FILE" > "$KEY_FILE"
          rm -f "$TMP_FILE"

          chmod 600 "$KEY_FILE"

          if ! ssh-keygen -y -f "$KEY_FILE" > /dev/null 2>&1; then
            echo "::error::Could not parse private key from ORACLE_SSH_KEY. If this is a .ppk key, convert it to OpenSSH PEM first."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key_path: /home/runner/.ssh/deploy_key
          passphrase: ${{ env.DEPLOY_PASSPHRASE }}
          port: ${{ env.DEPLOY_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="$HOME/Agente_ImobiliarIA"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }} "$APP_DIR"
            fi

            cd "$APP_DIR"

            git fetch origin
            git reset --hard origin/main

            python3 -m venv .venv
            source .venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            sudo systemctl daemon-reload
            sudo systemctl restart agente-imobiliaria.service
            sudo systemctl status agente-imobiliaria.service --no-pager -n 20
