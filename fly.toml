app = "grankasa-backend"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile.backend"

[http_service]
  internal_port = 8010
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/docs"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
